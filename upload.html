<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contextlens — 결과 업로드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }
    .logo { font-size: 16px; font-weight: 500; }
    .logo span { color: #2563eb; }
    .back-btn {
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
    }
    .back-btn:hover { color: #1a1a1a; }

    /* MAIN */
    .main { max-width: 560px; margin: 0 auto; padding: 36px 24px 60px; }
    .page-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #666; margin-bottom: 32px; }

    /* SECTION */
    .section { margin-bottom: 24px; }
    .label { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; display: block; }
    .sublabel { font-size: 12px; color: #aaa; margin-bottom: 8px; }

    /* INPUTS */
    input[type=text], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      font-size: 13px;
      font-family: inherit;
    }
    input[type=text]:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* SOURCE BUTTONS */
    .source-group { display: flex; gap: 8px; }
    .source-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 13px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
      color: #555;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .source-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .source-btn:hover:not(.active) { border-color: #bbb; }

    /* FILE DROP */
    .file-drop {
      border: 1.5px dashed #c0c0c0;
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.15s;
    }
    .file-drop:hover { border-color: #2563eb; }
    .file-drop i { font-size: 28px; color: #aaa; }
    .file-drop-title { font-size: 14px; color: #555; font-weight: 500; }
    .file-drop-sub { font-size: 12px; color: #aaa; }

    /* DIVIDER */
    .divider { height: 1px; background: #e0e0e0; margin: 24px 0; }

    /* AUTO SECTION */
    .auto-section {
      background: #eeecea;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e0e0e0;
    }
    .auto-title {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .auto-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .auto-row:last-child { border-bottom: none; }
    .auto-key { font-size: 13px; color: #555; }
    .auto-val { font-size: 13px; color: #aaa; font-style: italic; }

    /* SUBMIT */
    .submit-btn {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #333; }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="logo">context<span>lens</span></span>
    <button class="back-btn">
      <i class="ti ti-arrow-left"></i> 아카이브로 돌아가기
    </button>
  </nav>

  <main class="main">
    <h1 class="page-title">분석 결과 업로드</h1>
    <p class="page-sub">엑셀 파일과 분석 설명을 입력해주세요</p>

    <!-- 닉네임 -->
    <div class="section">
      <label class="label">닉네임</label>
      <input type="text" placeholder="공개될 닉네임을 입력하세요">
    </div>

    <!-- 출처 -->
    <div class="section">
      <label class="label">조사 출처</label>
      <div class="source-group">
        <div class="source-btn active">뉴스</div>
        <div class="source-btn">커뮤니티</div>
        <div class="source-btn">혼합</div>
      </div>
    </div>

    <!-- 분석 설명 -->
    <div class="section">
      <label class="label">분석 설명</label>
      <p class="sublabel">아카이브 카드에 표시됩니다</p>
      <textarea placeholder="예) MZ세대 옆에 갈등, 태도, 문제 등 부정적 단어의 유사도가 상위권에 집중됨."></textarea>
    </div>

    <!-- 수집 건수 -->
    <div class="section">
      <label class="label">수집 건수</label>
      <p class="sublabel">분석에 사용된 기사 수를 입력하세요</p>
      <input type="text" placeholder="예) 1240">
    </div>

    <!-- 태그 -->
    <div class="section">
      <label class="label">태그</label>
      <p class="sublabel">쉼표로 구분해서 입력하세요</p>
      <input type="text" placeholder="예) 세대, 미디어, 청년">
    </div>

    <!-- 파일 업로드 -->
    <div class="section">
      <label class="label">엑셀 파일</label>
      <p class="sublabel">근연도 분석 결과 파일을 첨부하세요</p>
      <div class="file-drop">
        <i class="ti ti-file-spreadsheet"></i>
        <span class="file-drop-title">파일을 끌어다 놓거나 클릭해서 선택</span>
        <span class="file-drop-sub">.xlsx 파일만 가능</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 자동 처리 항목 -->
    <div class="auto-section">
      <div class="auto-title">자동으로 처리되는 정보</div>
      <div class="auto-row">
        <span class="auto-key">업로드 시간</span>
        <span class="auto-val">업로드 시 자동 기록</span>
      </div>
      <div class="auto-row">
        <span class="auto-key">타겟 키워드</span>
        <span class="auto-val">엑셀 파일에서 자동 추출</span>
      </div>
      <div class="auto-row">
        <span class="auto-key">워드클라우드 시각화</span>
        <span class="auto-val">엑셀 데이터 기반 자동 생성</span>
      </div>
    </div>

    <button class="submit-btn">업로드하기</button>
  </main>

</body>
</html>
